<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draper IT Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14;--surface:#13161d;--surface2:#1a1e28;--border:#252a38;
    --text:#e8eaf0;--muted:#5a6080;--accent:#4f8ef7;
    --new-starter:#22c55e;--new-starter-bg:rgba(34,197,94,0.38);
    --leaver:#ef4444;--leaver-bg:rgba(239,68,68,0.38);
    --holiday:#38bdf8;--holiday-bg:rgba(56,189,248,0.38);
    --task:#f97316;--task-bg:rgba(249,115,22,0.38);
    --bank-holiday:#fbbf24;--bank-holiday-bg:rgba(251,191,36,0.42);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;padding:40px 16px 8px}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:70px;gap:12px}
  .brand-wrap{display:flex;align-items:center;gap:10px}
  .cyber-cat{position:relative;width:36px;height:36px;flex-shrink:0}
  .cyber-cat::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:radial-gradient(circle,rgba(79,142,247,0.55) 0%,rgba(79,142,247,0.18) 50%,transparent 75%);animation:catGlow 3s ease-in-out infinite;filter:blur(3px)}
  @keyframes catGlow{0%,100%{opacity:.8;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
  .cyber-cat svg{width:36px;height:36px;position:relative;z-index:1;filter:drop-shadow(0 0 6px rgba(79,142,247,0.9));animation:catPulse 3s ease-in-out infinite}
  @keyframes catPulse{0%,100%{filter:drop-shadow(0 0 6px rgba(79,142,247,0.9))}50%{filter:drop-shadow(0 0 12px rgba(100,180,255,1))}}
  .brand-title{font-size:16px;font-weight:800;letter-spacing:-0.5px;white-space:nowrap;line-height:1.15}
  .brand-title .dim{color:var(--muted);font-weight:400}
  .brand-subtitle{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-top:1px}
  .header-center{display:flex;align-items:center;gap:10px;flex:1;justify-content:center}
  .month-label{font-size:22px;font-weight:800;letter-spacing:-1px;min-width:180px;text-align:center}
  .nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background 0.15s;flex-shrink:0}
  .nav-btn:hover{background:var(--border)}
  .today-btn{background:var(--accent);border:none;color:#fff;padding:0 10px;height:28px;border-radius:6px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;font-size:11px;white-space:nowrap}
  .live-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:5px;align-items:center}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
  .legend-dot{width:7px;height:7px;border-radius:2px}
  .day-names{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:4px}
  .day-name-cell{text-align:center;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);padding:3px 0}
  .month-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
  .day-cell{background:var(--surface);border:1px solid var(--border);border-radius:8px;min-height:95px;display:flex;flex-direction:column;overflow:hidden;transition:border-color 0.15s;cursor:pointer;position:relative}
  .day-cell:hover{border-color:var(--muted)}
  .day-cell.is-today{border-color:var(--accent)}
  .day-cell.is-today .day-num{color:var(--accent)}
  .day-cell.is-bank-holiday{background:rgba(251,191,36,0.07);border-color:rgba(251,191,36,0.5)}
  .day-cell.is-bank-holiday .day-num{color:var(--bank-holiday)}
  .day-cell-header{display:flex;align-items:center;justify-content:space-between;padding:5px 8px 3px}
  .day-num{font-size:13px;font-weight:800;color:var(--text);line-height:1}
  .day-add{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;line-height:1;opacity:0;transition:opacity 0.15s;padding:0 2px}
  .day-cell:hover .day-add{opacity:1}
  .day-add:hover{color:var(--accent)}
  .day-events-wrap{flex:1;padding:0 4px 5px;display:flex;flex-direction:column;gap:3px;overflow:hidden}
  .pill{border-radius:5px;padding:4px 8px 4px 7px;border-left:4px solid transparent;display:flex;align-items:center;gap:4px;position:relative;cursor:default;font-size:11px;font-weight:700;color:#fff;line-height:1.2;text-shadow:0 1px 2px rgba(0,0,0,0.4)}
  .pill.new-starter{background:var(--new-starter-bg);border-color:var(--new-starter)}
  .pill.leaver{background:var(--leaver-bg);border-color:var(--leaver)}
  .pill.holiday{background:var(--holiday-bg);border-color:var(--holiday)}
  .pill.task{background:var(--task-bg);border-color:var(--task)}
  .pill.bank-holiday{background:var(--bank-holiday-bg);border-color:var(--bank-holiday);color:#1a1200;font-weight:800;text-shadow:none}
  .pill.continuation{opacity:.7;border-left-width:2px;border-left-color:transparent;padding-left:12px}
  .pill-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .pill-del{background:none;border:none;color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;line-height:1;opacity:0;transition:opacity 0.12s;flex-shrink:0;padding:0 1px}
  .pill:hover .pill-del{opacity:1}
  .pill-del:hover{color:#fff}
  .overflow-pill{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;padding:4px 8px}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;width:460px;max-width:95vw;transform:translateY(14px);transition:transform 0.2s;max-height:90vh;overflow-y:auto}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-title{font-size:20px;font-weight:800;margin-bottom:4px}
  .modal-subtitle{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:20px}
  .form-group{margin-bottom:15px}
  label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
  input,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;padding:10px 13px;outline:none;transition:border-color 0.15s;-webkit-appearance:none}
  input:focus,textarea:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:65px}
  input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.6);cursor:pointer}
  .date-mode-toggle{display:flex;gap:8px;margin-bottom:12px}
  .toggle-btn{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:8px;border-radius:9px;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;transition:all 0.15s;text-align:center}
  .toggle-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .date-range-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:end}
  .date-range-arrow{color:var(--muted);font-size:20px;text-align:center;padding-bottom:10px}
  .date-range-group label{margin-bottom:5px}
  .type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
  .type-option{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 6px;text-align:center;cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;transition:all 0.15s;color:var(--muted);user-select:none}
  .type-option:hover{border-color:var(--muted);color:var(--text)}
  .type-option.selected-new-starter{background:var(--new-starter-bg);border-color:var(--new-starter);color:var(--new-starter)}
  .type-option.selected-leaver{background:var(--leaver-bg);border-color:var(--leaver);color:var(--leaver)}
  .type-option.selected-holiday{background:var(--holiday-bg);border-color:var(--holiday);color:var(--holiday)}
  .type-option.selected-task{background:var(--task-bg);border-color:var(--task);color:var(--task)}
  .type-option.selected-bank-holiday{background:var(--bank-holiday-bg);border-color:var(--bank-holiday);color:var(--bank-holiday)}
  .modal-actions{display:flex;gap:10px;margin-top:20px}
  .btn-cancel{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:12px;border-radius:10px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;font-size:14px}
  .btn-save{flex:2;background:var(--accent);border:none;color:#fff;padding:12px;border-radius:10px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
  .btn-save:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<header>
  <div class="brand-wrap">
    <div class="cyber-cat">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
        <polygon points="18,42 10,12 36,30" fill="#1a2a4a" stroke="#4f8ef7" stroke-width="2.5" stroke-linejoin="round"/>
        <polygon points="82,42 90,12 64,30" fill="#1a2a4a" stroke="#4f8ef7" stroke-width="2.5" stroke-linejoin="round"/>
        <polygon points="22,38 16,20 34,32" fill="rgba(79,142,247,0.25)"/>
        <polygon points="78,38 84,20 66,32" fill="rgba(79,142,247,0.25)"/>
        <ellipse cx="50" cy="57" rx="34" ry="30" fill="#0d1826" stroke="#4f8ef7" stroke-width="2.5"/>
        <ellipse cx="37" cy="53" rx="8" ry="7" fill="#0a1520" stroke="#4f8ef7" stroke-width="1.5"/>
        <ellipse cx="63" cy="53" rx="8" ry="7" fill="#0a1520" stroke="#4f8ef7" stroke-width="1.5"/>
        <ellipse cx="37" cy="53" rx="3" ry="6" fill="#4f8ef7" opacity="0.9"/>
        <ellipse cx="63" cy="53" rx="3" ry="6" fill="#4f8ef7" opacity="0.9"/>
        <circle cx="35" cy="51" r="1.2" fill="white" opacity="0.8"/>
        <circle cx="61" cy="51" r="1.2" fill="white" opacity="0.8"/>
        <polygon points="50,63 47,67 53,67" fill="#4f8ef7" opacity="0.8"/>
        <path d="M44,70 Q47,74 50,70 Q53,74 56,70" stroke="#4f8ef7" stroke-width="1.5" opacity="0.7" fill="none" stroke-linecap="round"/>
        <line x1="16" y1="62" x2="40" y2="64" stroke="#4f8ef7" stroke-width="1.2" opacity="0.5"/>
        <line x1="16" y1="68" x2="40" y2="67" stroke="#4f8ef7" stroke-width="1.2" opacity="0.5"/>
        <line x1="84" y1="62" x2="60" y2="64" stroke="#4f8ef7" stroke-width="1.2" opacity="0.5"/>
        <line x1="84" y1="68" x2="60" y2="67" stroke="#4f8ef7" stroke-width="1.2" opacity="0.5"/>
        <rect x="24" y="82" width="52" height="8" rx="4" fill="#0d1826" stroke="#4f8ef7" stroke-width="1.5"/>
        <circle cx="50" cy="86" r="3" fill="#4f8ef7" opacity="0.9"/>
      </svg>
    </div>
    <div>
      <div class="brand-title">Draper IT <span class="dim">Calendar</span></div>
      <div class="brand-subtitle">Support Team Wallboard</div>
    </div>
  </div>
  <div class="header-center">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="header-right">
    <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)"><span class="live-dot"></span><span id="todayLabel"></span></span>
    <div id="statusMsg" style="display:none;font-family:'DM Mono',monospace;font-size:11px;padding:6px 12px;border-radius:6px;border:1px solid;line-height:1.5;max-width:500px;white-space:pre-wrap;"></div>
    <button class="today-btn" onclick="goToday()">This Month</button>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--new-starter)"></div>New Starter</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--leaver)"></div>Leaver</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--holiday)"></div>Holiday</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--task)"></div>Task</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--bank-holiday)"></div>Bank Holiday</div>
  <div style="margin-left:auto;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;">Click day or + to add &middot; hover pill &rarr; &#10005; to remove</div>
</div>

<div class="day-names" id="dayNames"></div>
<div class="month-grid" id="monthGrid"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Add Calendar Item</div>
    <div class="modal-subtitle" id="modalDate"></div>
    <div class="form-group">
      <label>Type</label>
      <div class="type-grid">
        <div class="type-option" id="type-new-starter"  onclick="selectType('new-starter')">&#x1F7E2; New Starter</div>
        <div class="type-option" id="type-leaver"       onclick="selectType('leaver')">&#x1F534; Leaver</div>
        <div class="type-option" id="type-holiday"      onclick="selectType('holiday')">&#x1F535; Holiday</div>
        <div class="type-option" id="type-task"         onclick="selectType('task')">&#x1F7E0; Task</div>
        <div class="type-option" id="type-bank-holiday" onclick="selectType('bank-holiday')">&#x1F3E6; Bank Holiday</div>
      </div>
    </div>
    <div class="form-group">
      <label>Date</label>
      <div class="date-mode-toggle">
        <div class="toggle-btn active" id="modeSingle" onclick="setDateMode('single')">Single Day</div>
        <div class="toggle-btn"        id="modeRange"  onclick="setDateMode('range')">Date Range</div>
      </div>
      <div id="singleDateWrap"><input type="date" id="eventDateSingle"></div>
      <div id="rangeDateWrap" style="display:none">
        <div class="date-range-row">
          <div class="date-range-group"><label>From</label><input type="date" id="eventDateFrom"></div>
          <div class="date-range-arrow">&rarr;</div>
          <div class="date-range-group"><label>To</label><input type="date" id="eventDateTo"></div>
        </div>
      </div>
    </div>
    <div class="form-group"><label>Name / Title</label><input type="text" id="eventName" placeholder="e.g. Sarah Johnson"></div>
    <div class="form-group"><label>Note (optional)</label><textarea id="eventNote" placeholder="e.g. Annual leave approved"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save"   onclick="saveEvent()">Add to Calendar</button>
    </div>
  </div>
</div>

<script>
var TENANT_ID  = '8468f04e-ed1d-433f-99d9-2641bb0f49f6';
var CLIENT_ID  = '72e81aaf-8551-41b3-b12f-966e31b08383';
var LIST_NAME  = 'Tech Support Calendar';
var GRAPH_BASE = 'https://graph.microsoft.com/v1.0';
var SCOPES     = ['https://graph.microsoft.com/Sites.ReadWrite.All'];
var REDIRECT   = 'https://draperit.github.io/draper-it-calendar/';

var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAY_NAMES   = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
var MAX_PILLS   = 3;

var UK_BH = {
  '2024-01-01':"New Year's Day",'2024-03-29':'Good Friday','2024-04-01':'Easter Monday',
  '2024-05-06':'Early May BH','2024-05-27':'Spring BH','2024-08-26':'Summer BH',
  '2024-12-25':'Christmas Day','2024-12-26':'Boxing Day',
  '2025-01-01':"New Year's Day",'2025-04-18':'Good Friday','2025-04-21':'Easter Monday',
  '2025-05-05':'Early May BH','2025-05-26':'Spring BH','2025-08-25':'Summer BH',
  '2025-12-25':'Christmas Day','2025-12-26':'Boxing Day',
  '2026-01-01':"New Year's Day",'2026-04-03':'Good Friday','2026-04-06':'Easter Monday',
  '2026-05-04':'Early May BH','2026-05-25':'Spring BH','2026-08-31':'Summer BH',
  '2026-12-25':'Christmas Day','2026-12-28':'Boxing Day (subst.)'
};

var allEvents=[], monthOffset=0, selectedType='', dateMode='single', modalStartKey=null;
var msalInstance=null, graphSiteId=null, graphListId=null, currentAccount=null;

function dateKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function pad(n){return n<10?'0'+n:''+n}
function parseKey(k){var p=k.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function fmtShort(k){return parseKey(k).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

function normType(raw){
  if(!raw)return 'task';
  var v=raw.toLowerCase().replace(/[\s_-]+/g,'-');
  if(['new-starter','leaver','holiday','task','bank-holiday'].indexOf(v)>=0)return v;
  if(v.indexOf('new')>=0||v.indexOf('starter')>=0)return 'new-starter';
  if(v.indexOf('leav')>=0)return 'leaver';
  if(v.indexOf('holiday')>=0||v.indexOf('leave')>=0)return 'holiday';
  if(v.indexOf('bank')>=0)return 'bank-holiday';
  return 'task';
}

function setStatus(msg,isErr){
  var el=document.getElementById('statusMsg');
  if(!el)return;
  if(!msg){el.style.display='none';return}
  el.textContent=msg;
  el.style.display='block';
  el.style.color=isErr?'#ef4444':'var(--accent)';
  el.style.background=isErr?'rgba(239,68,68,0.12)':'rgba(79,142,247,0.12)';
  el.style.borderColor=isErr?'rgba(239,68,68,0.3)':'rgba(79,142,247,0.3)';
}

function getToken(){
  return new Promise(function(resolve,reject){
    var accounts=msalInstance.getAllAccounts();
    if(accounts.length===0){
      setStatus('Redirecting to Microsoft login...');
      msalInstance.loginRedirect({scopes:SCOPES}).catch(reject);
      return;
    }
    currentAccount=accounts[0];
    msalInstance.acquireTokenSilent({scopes:SCOPES,account:currentAccount})
      .then(function(r){resolve(r.accessToken)})
      .catch(function(){
        msalInstance.acquireTokenRedirect({scopes:SCOPES,account:currentAccount}).catch(reject);
      });
  });
}

function gFetch(method,url,body){
  return getToken().then(function(token){
    if(!token)return null;
    var opts={method:method,headers:{Authorization:'Bearer '+token}};
    if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body)}
    return fetch(url,opts).then(function(res){
      if(method==='DELETE'&&res.status===204)return null;
      return res.text().then(function(txt){
        if(!res.ok)throw new Error(method+' '+res.status+': '+txt);
        return txt?JSON.parse(txt):null;
      });
    });
  });
}

function ensureSiteList(){
  if(graphSiteId&&graphListId)return Promise.resolve();
  setStatus('Connecting to SharePoint...');
  return gFetch('GET',GRAPH_BASE+'/sites/drapertoolsltd.sharepoint.com:/sites/techsupport')
    .then(function(site){
      graphSiteId=site.id;
      return gFetch('GET',GRAPH_BASE+'/sites/'+graphSiteId+'/lists?$select=id,displayName');
    })
    .then(function(data){
      var lists=data.value||[];
      var match=lists.filter(function(l){return l.displayName.toLowerCase()===LIST_NAME.toLowerCase()})[0];
      if(!match)throw new Error('List "'+LIST_NAME+'" not found. Found: '+lists.map(function(l){return l.displayName}).join(', '));
      graphListId=match.id;
      setStatus('');
    });
}

function loadEvents(){
  return ensureSiteList().then(function(){
    setStatus('Loading events...');
    return gFetch('GET',GRAPH_BASE+'/sites/'+graphSiteId+'/lists/'+graphListId+'/items?expand=fields&$top=999');
  }).then(function(data){
    allEvents=(data.value||[]).map(function(item){return{
      id:item.id,
      type:normType(item.fields.Category),
      name:item.fields.Title||'',
      note:item.fields.Description||'',
      startDate:item.fields.EventDate?item.fields.EventDate.substring(0,10):'',
      endDate:item.fields.EndDate?item.fields.EndDate.substring(0,10):''
    }}).filter(function(ev){return ev.startDate});
    setStatus('');
    render();
  });
}

function saveToSP(ev){
  return ensureSiteList().then(function(){
    setStatus('Saving...');
    return gFetch('POST',GRAPH_BASE+'/sites/'+graphSiteId+'/lists/'+graphListId+'/items',
      {fields:{Title:ev.name,Category:ev.type,EventDate:ev.startDate+'T00:00:00Z',EndDate:ev.endDate+'T23:59:00Z',Description:ev.note,fAllDayEvent:true}});
  }).then(function(created){
    if(created)ev.id=created.id;
    setStatus('');
  });
}

function deleteFromSP(spId){
  return ensureSiteList().then(function(){
    setStatus('Deleting...');
    return gFetch('DELETE',GRAPH_BASE+'/sites/'+graphSiteId+'/lists/'+graphListId+'/items/'+spId);
  }).then(function(){setStatus('')});
}

function render(){
  var today=new Date();today.setHours(0,0,0,0);
  var ref=new Date(today.getFullYear(),today.getMonth()+monthOffset,1);
  var year=ref.getFullYear(),month=ref.getMonth();
  document.getElementById('monthLabel').textContent=MONTH_NAMES[month]+' '+year;
  document.getElementById('todayLabel').textContent=today.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  var dn=document.getElementById('dayNames');dn.innerHTML='';
  DAY_NAMES.forEach(function(n){var c=document.createElement('div');c.className='day-name-cell';c.textContent=n;dn.appendChild(c)});
  var grid=document.getElementById('monthGrid');grid.innerHTML='';
  var first=new Date(year,month,1),fdow=first.getDay(),fcol=fdow===0?6:fdow-1;
  for(var s=0;s<(fcol<=4?fcol:0);s++){var sp=document.createElement('div');sp.className='day-cell';sp.style.visibility='hidden';sp.style.pointerEvents='none';grid.appendChild(sp)}
  var cur=new Date(first);
  while(cur.getMonth()===month){
    var dow=cur.getDay();
    if(dow!==0&&dow!==6){
      var date=new Date(cur),key=dateKey(date),isToday=key===dateKey(today);
      var cell=document.createElement('div');cell.className='day-cell'+(isToday?' is-today':'');
      var hdr=document.createElement('div');hdr.className='day-cell-header';
      var num=document.createElement('div');num.className='day-num';num.textContent=date.getDate();
      var addBtn=document.createElement('button');addBtn.className='day-add';addBtn.textContent='+';addBtn.title='Add item';
      (function(k,d){addBtn.onclick=function(e){e.stopPropagation();openModal(k,d)}})(key,date);
      hdr.appendChild(num);hdr.appendChild(addBtn);cell.appendChild(hdr);
      (function(k,d){cell.onclick=function(){openModal(k,d)}})(key,date);
      var wrap=document.createElement('div');wrap.className='day-events-wrap';
      var bh=UK_BH[key];
      if(bh){
        cell.classList.add('is-bank-holiday');
        var bp=document.createElement('div');bp.className='pill bank-holiday';
        var bs=document.createElement('span');bs.className='pill-name';bs.textContent='\uD83C\uDFE6 '+bh;
        bp.appendChild(bs);wrap.appendChild(bp);
      }
      var dayEvs=allEvents.filter(function(ev){return key>=ev.startDate&&key<=ev.endDate});
      var visible=dayEvs.slice(0,MAX_PILLS-(bh?1:0));
      var hidden=dayEvs.length-visible.length;
      visible.forEach(function(ev){
        var isStart=key===ev.startDate,isMulti=ev.startDate!==ev.endDate;
        var pill=document.createElement('div');pill.className='pill '+ev.type+(isMulti&&!isStart?' continuation':'');
        var nm=document.createElement('span');nm.className='pill-name';nm.textContent=ev.name+(isMulti&&isStart?' (\u2192'+fmtShort(ev.endDate)+')':'');
        var del=document.createElement('button');del.className='pill-del';del.textContent='\u2715';del.title='Remove';
        (function(id){del.onclick=function(e){e.stopPropagation();deleteEvent(id)}})(ev.id);
        pill.appendChild(nm);pill.appendChild(del);wrap.appendChild(pill);
      });
      if(hidden>0){var more=document.createElement('div');more.className='overflow-pill';more.textContent='+'+hidden+' more';wrap.appendChild(more)}
      cell.appendChild(wrap);grid.appendChild(cell);
    }
    cur.setDate(cur.getDate()+1);
  }
}

function openModal(key,d){
  modalStartKey=key;selectedType='';
  document.querySelectorAll('.type-option').forEach(function(el){el.className='type-option'});
  document.getElementById('eventName').value='';
  document.getElementById('eventNote').value='';
  document.getElementById('eventDateSingle').value=key;
  document.getElementById('eventDateFrom').value=key;
  document.getElementById('eventDateTo').value=key;
  setDateMode('single');
  document.getElementById('modalDate').textContent=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(function(){document.getElementById('eventName').focus()},180);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}
function selectType(type){
  selectedType=type;
  document.querySelectorAll('.type-option').forEach(function(el){el.className='type-option'});
  document.getElementById('type-'+type).className='type-option selected-'+type;
  if(type==='holiday'&&dateMode==='single')setDateMode('range');
}
function setDateMode(mode){
  dateMode=mode;
  document.getElementById('modeSingle').classList.toggle('active',mode==='single');
  document.getElementById('modeRange').classList.toggle('active',mode==='range');
  document.getElementById('singleDateWrap').style.display=mode==='single'?'':'none';
  document.getElementById('rangeDateWrap').style.display=mode==='range'?'':'none';
  if(mode==='range'){var s=document.getElementById('eventDateSingle').value||modalStartKey||'';document.getElementById('eventDateFrom').value=s;document.getElementById('eventDateTo').value=s}
  else{document.getElementById('eventDateSingle').value=document.getElementById('eventDateFrom').value||modalStartKey||''}
}
function saveEvent(){
  var name=document.getElementById('eventName').value.trim();
  if(!selectedType){alert('Please select a type.');return}
  if(!name){alert('Please enter a name.');return}
  var startDate,endDate;
  if(dateMode==='single'){startDate=document.getElementById('eventDateSingle').value;endDate=startDate}
  else{startDate=document.getElementById('eventDateFrom').value;endDate=document.getElementById('eventDateTo').value}
  if(!startDate){alert('Please choose a date.');return}
  if(endDate<startDate){alert('End date must be on or after start.');return}
  var note=document.getElementById('eventNote').value.trim();
  var ev={id:uid(),type:selectedType,name:name,note:note,startDate:startDate,endDate:endDate};
  var btn=document.querySelector('.btn-save');btn.textContent='Saving...';btn.disabled=true;
  saveToSP(ev).then(function(){allEvents.push(ev);closeModal();render()})
    .catch(function(err){console.error(err);alert('Failed to save: '+err.message)})
    .then(function(){btn.textContent='Add to Calendar';btn.disabled=false});
}
function deleteEvent(id){
  if(!confirm('Remove this event?'))return;
  deleteFromSP(id).then(function(){allEvents=allEvents.filter(function(ev){return ev.id!==id});render()})
    .catch(function(err){alert('Failed to delete: '+err.message)});
}
function changeMonth(dir){monthOffset+=dir;render()}
function goToday(){monthOffset=0;render()}

document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===document.getElementById('modalOverlay'))closeModal()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});
document.getElementById('eventDateFrom').addEventListener('change',function(){
  var f=document.getElementById('eventDateFrom').value;
  if(document.getElementById('eventDateTo').value<f)document.getElementById('eventDateTo').value=f;
});

// Load MSAL then boot
(function(){
  var cdns=[
    'https://unpkg.com/@azure/msal-browser@2.38.3/lib/msal-browser.min.js',
    'https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js',
    'https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js'
  ];
  function tryLoad(i){
    if(i>=cdns.length){setStatus('Could not load auth library.',true);return}
    var s=document.createElement('script');s.src=cdns[i];
    s.onload=function(){
      console.log('MSAL loaded:',cdns[i]);
      msalInstance=new msal.PublicClientApplication({
        auth:{clientId:CLIENT_ID,authority:'https://login.microsoftonline.com/'+TENANT_ID,redirectUri:REDIRECT},
        cache:{cacheLocation:'sessionStorage'},
        system:{allowNativeBroker:false}
      });
      msalInstance.handleRedirectPromise().then(function(response){
        if(response)currentAccount=response.account;
        render();
        loadEvents().catch(function(err){setStatus('Error: '+err.message,true)});
      }).catch(function(err){setStatus('Auth error: '+err.message,true)});
    };
    s.onerror=function(){tryLoad(i+1)};
    document.head.appendChild(s);
  }
  tryLoad(0);
})();
</script>
